name: Enterprise QA Automation Pipeline

# TRIGGER: When does this run? Every time someone pushes code to GitHub.
on: [push]

jobs:
  run-all-tests:
    runs-on: ubuntu-latest # Borrow a blank Linux server from Microsoft

    steps:
      - name: 1. Download our code into the server
        uses: actions/checkout@v4

      - name: 2. Install Python on the server
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install our engines (Selenium, Requests, PyTest)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html selenium requests

      - name: 4. Execute the framework
        run: pytest test_discount.py test_api.py -v -s --html=report.html